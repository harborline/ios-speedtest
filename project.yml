name: SpeedTest
options:
  bundleIdPrefix: com.speedteststealth
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "8SBK293L6F"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic

targets:
  SpeedTest:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - SpeedTest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speedteststealth
        INFOPLIST_FILE: SpeedTest/Info.plist
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  SpeedTest:
    build:
      targets:
        SpeedTest: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
